services:
  search:
    build: ./services/search
    ports:
      - "8001:8001"
    volumes:
      - ../v1/chroma_db:/data/chroma_db
    environment:
      - CHROMA_PATH=/data/chroma_db

  summarize:
    build: ./services/summarize
    ports:
      - "8002:8002"
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434

  write:
    build: ./services/write
    ports:
      - "8003:8003"
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434

  orchestrator:
    build: ./services/orchestrator
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - SEARCH_URL=http://search:8001
      - SUMMARIZE_URL=http://summarize:8002
      - WRITE_URL=http://write:8003
    depends_on:
      - search
      - summarize
      - write
