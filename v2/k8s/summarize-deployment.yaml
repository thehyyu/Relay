apiVersion: apps/v1
kind: Deployment
metadata:
  name: summarize
spec:
  replicas: 1
  selector:
    matchLabels:
      app: summarize
  template:
    metadata:
      labels:
        app: summarize
    spec:
      containers:
      - name: summarize
        image: relay-summarize:v2b
        imagePullPolicy: Never
        ports:
        - containerPort: 8002
        envFrom:
        - configMapRef:
            name: relay-config
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8002
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8002
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: summarize
spec:
  selector:
    app: summarize
  ports:
  - port: 8002
    targetPort: 8002
